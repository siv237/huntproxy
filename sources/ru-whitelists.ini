# ──────────────────────────────────────────────────────────────────────────────
# Russian "white list" sources — the THIRD category: resources OF the country
# that should be reached directly (or via a Russian proxy), NOT through the
# foreign proxy pool. Added here so they are seeded like the built-in sources.
#
# Fields used by these entries:
#   direction = domestic   — resources of RU that must stay local
#   class     = white      — default route = direct (override via `route`)
#   route     = direct     — send matched traffic directly, bypass the pool
#   type      = domain     — parsed into domain_lists patterns (routing)
#
# The loader now understands upstream proxy-tool formats too:
#   * plain one-domain-per-line (optionally "domain:port" — port is stripped)
#   * Clash  : - 'DOMAIN-SUFFIX,vk.com' / 'DOMAIN,vk.com'
#   * v2fly  : domain-suffix:vk.com / domain:vk.com
# So the found lists below are normalized into clean patterns automatically.
# ──────────────────────────────────────────────────────────────────────────────

# Primary RU white list (Минцифры / gogov.ru based: gov, Yandex, VK, Госуслуги).
# Plain "domain:port" format — the loader strips the port.
[blocklist:ru-whitelist-kort0881]
name      = Russia Whitelist (Минцифры/gogov)
country   = RU
direction = domestic
class     = white
type      = domain
route     = direct
url       = https://raw.githubusercontent.com/kort0881/russia-whitelist/main/whitelist.txt

# Full RU direct-domains list (Clash payload format — DOMAIN-SUFFIX rules).
[blocklist:ru-direct-purposearch]
name      = Russia Direct Domains (russiadirect.lst)
country   = RU
direction = domestic
class     = white
type      = domain
route     = direct
url       = https://gist.githubusercontent.com/Purpose-arch/c72cf3776b9385ffa80efa6b3beb554b/raw/russiadirect.lst
