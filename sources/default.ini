# ──────────────────────────────────────────────────────────────────────────────
# Default list sources for huntproxy.
#
# This file is the single source of truth for built-in ("factory") sources.
# At startup it (and any other *.ini in this folder) is parsed and seeded into
# an empty state.db. Manually added sources are never overwritten. Removing the
# data/ directory resets runtime state, but this file survives the reset, so
# the system repopulates defaults without manual entry.
#
# Any *.ini with valid syntax placed in this folder is merged into the defaults.
# Each source type is marked with its own section syntax:
#
#   [proxy]            — proxy list sources. Key = human-readable label,
#                       value = URL. Source id and protocol are derived from
#                       the URL automatically.
#
#   [ip_blacklist]     — IP blacklists (malicious IP/CIDR feeds used for proxy
#                       egress scoring). Key = source name, value = URL.
#
#   [blocklist:<id>]   — country blocklists, one section per source.
#                       Fields: name, country, direction, type, url.
#                         direction = inside  — blocked WITHIN the country
#                                               (e.g. RKN blocks resources in RU)
#                         direction = outside — blocked FOR the country from
#                                               abroad (e.g. geo-block of RU users)
#                         type = ip     → feeds IP blacklist scoring
#                         type = domain → creates a domain_lists entry (route=pool)
# ──────────────────────────────────────────────────────────────────────────────


# ── Proxy sources ─────────────────────────────────────────────────────────────
[proxy]
monosans-socks5     = https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/socks5.txt
monosans-socks4     = https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/socks4.txt
monosans-http       = https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt
TheSpeedX-socks5    = https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt
TheSpeedX-socks4    = https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks4.txt
TheSpeedX-http      = https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt
roosterkid-HTTPS    = https://raw.githubusercontent.com/roosterkid/openproxylist/main/HTTPS_RAW.txt
hookzof-socks5      = https://raw.githubusercontent.com/hookzof/socks5_list/master/proxy.txt
zevtyardt-socks5    = https://raw.githubusercontent.com/zevtyardt/proxy-list/main/socks5.txt
zevtyardt-socks4    = https://raw.githubusercontent.com/zevtyardt/proxy-list/main/socks4.txt
zevtyardt-http      = https://raw.githubusercontent.com/zevtyardt/proxy-list/main/http.txt
mmpx12-socks5       = https://raw.githubusercontent.com/mmpx12/proxy-list/master/socks5.txt
mmpx12-socks4       = https://raw.githubusercontent.com/mmpx12/proxy-list/master/socks4.txt
mmpx12-http         = https://raw.githubusercontent.com/mmpx12/proxy-list/master/http.txt
mmpx12-https        = https://raw.githubusercontent.com/mmpx12/proxy-list/master/https.txt
ShiftyTR-socks5     = https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/socks5.txt
ShiftyTR-socks4     = https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/socks4.txt
ShiftyTR-http       = https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/http.txt
ShiftyTR-https      = https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/https.txt
ALIILAPRO-socks5    = https://raw.githubusercontent.com/ALIILAPRO/Proxy/main/socks5.txt
ALIILAPRO-http      = https://raw.githubusercontent.com/ALIILAPRO/Proxy/main/http.txt
clarketm-proxy      = https://raw.githubusercontent.com/clarketm/proxy-list/master/proxy-list-raw.txt
sunny9577-http      = https://raw.githubusercontent.com/sunny9577/proxy-scraper/master/generated/http_proxies.txt


# ── IP blacklists ─────────────────────────────────────────────────────────────
[ip_blacklist]
Emerging Threats Compromised = https://rules.emergingthreats.net/blockrules/compromised-ips.txt
FireHOL Level 1              = https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset
IPsum Threat Feed            = https://raw.githubusercontent.com/stamparm/ipsum/master/ipsum.txt
Blocklist.de All             = https://lists.blocklist.de/lists/all.txt


# ── Country blocklists ────────────────────────────────────────────────────────
# Russia — inside: resources blocked within Russia (RKN DPI + geoblock of RU users).
# These go through proxy so Russian users regain access.
[blocklist:ru-rkn-ip]
name      = Russia RKN Blocked IPs
country   = RU
direction = inside
type      = ip
url       = https://antifilter.download/list/allyouneed.lst

[blocklist:ru-rkn-domains]
name      = Russia RKN Blocked Domains
country   = RU
direction = inside
type      = domain
url       = https://antifilter.download/list/domains.lst

[blocklist:ru-inside-domains]
name      = Russia Inside Domains
country   = RU
direction = inside
type      = domain
url       = https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Russia/inside-raw.lst

# Russia — outside: foreign services that block Russian users (OpenAI, Claude,
# Notion, X/Grok, etc.). Contains zero .ru domains — no Russian state/commercial
# resources are routed through foreign proxies.
[blocklist:ru-geoblock-domains]
name      = Russia Geoblocked Domains
country   = RU
direction = outside
type      = domain
url       = https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Categories/geoblock.lst
